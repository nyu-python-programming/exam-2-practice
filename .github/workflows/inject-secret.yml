name: Inject signing secret

# On every push, ensures .automations/config.json holds THIS repo's own signing
# secret, derived from a single org-level master secret as
# HMAC_SHA256(MASTER_SECRET, <owner/repo>). It overwrites the value whenever it
# doesn't already match -- whether that's the distribution placeholder or a
# secret inherited from a template repo this one was forked/copied from -- so
# every repo self-heals to its own unique secret on its first push (no template
# repo to special-case). Because the value is derived (not random), the
# instructor can recompute any repo's secret at grading time from the same
# master + repo name, with no repo->secret map to maintain.
#
# Setup (instructor, one time): create an *organization* Actions secret named
# MASTER_SIGNING_SECRET, scoped to the repositories GitHub Classroom creates.
# Org-level secrets are available to every repo Classroom generates in the org,
# which is what lets this self-inject without touching each repo by hand.

on:
  push:
    # Only on the default branch. A bare `on: push:` fires on EVERY branch,
    # including the local-only "autosave" evidence branch -- which made this job
    # check out autosave, commit the injected secret, and push it back, diverging
    # remote autosave from the watcher's local autosave branch and breaking every
    # subsequent autosave push with a non-fast-forward ("fetch first") rejection.
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive and write the per-repo signing secret
        env:
          MASTER_SECRET: ${{ secrets.MASTER_SIGNING_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${MASTER_SECRET}" ]; then
            echo "MASTER_SIGNING_SECRET org secret is not set; skipping injection."
            echo "The watcher will fall back to its weaker repo-derived secret."
            exit 0
          fi

          # This repo's OWN secret, derived from its name. Self-healing: we
          # ensure config holds exactly this value, overwriting whatever was
          # there -- the placeholder OR a secret inherited from a template repo
          # this one was forked/copied from. That makes the template-vs-fork
          # distinction irrelevant: every repo converges to its own unique
          # secret on its first push, with no repo to special-case.
          expected=$(printf '%s' "${GITHUB_REPOSITORY}" \
            | openssl dgst -sha256 -hmac "${MASTER_SECRET}" | awk '{print $2}')

          current=$(python3 -c "import json; print(json.load(open('.automations/config.json'))['signing_secret'])")
          if [ "${current}" = "${expected}" ]; then
            echo "Signing secret already matches this repo's derived value; nothing to do."
            exit 0
          fi

          python3 - "${expected}" <<'PY'
          import json, sys
          path = ".automations/config.json"
          with open(path) as f:
              config = json.load(f)
          config["signing_secret"] = sys.argv[1]
          with open(path, "w") as f:
              json.dump(config, f, indent=2)
              f.write("\n")
          PY

          git config user.name  "exam-bot"
          git config user.email "exam-bot@users.noreply.github.com"
          git add .automations/config.json
          git commit -m "Inject per-repo signing secret"
          git push
